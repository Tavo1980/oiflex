<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Responsive</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <nav class="navbar">
            <a href="#" class="logo">
                <img src="oiflex.png" alt="Logotipo">
            </a>

            <div class="nav-menu" id="navMenu">
                <a href="#" class="nav-link">Inicio</a>
                <a href="#" class="nav-link">Servicios</a>
                <a href="#" class="nav-link">Productos</a>
                <a href="#" class="nav-link">Contáctenos</a>
            </div>

            <div class="nav-actions">
                <a href="#" class="action-icon" title="Lista de deseos"><i class="fa-regular fa-heart"></i></a>
                <a href="#" class="action-icon" title="Login"><i class="fa-regular fa-user"></i></a>
                <a href="#" class="action-icon" title="Carrito"><i class="fa-solid fa-basket-shopping"></i></a>
                
                <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <script src="script.js"></script>
</body>
</html>
